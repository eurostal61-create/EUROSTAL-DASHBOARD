function pgd(s){if(!s)return new Date(9999,0,1);const p=s.split('/');return p.length===3?new Date(p[2],p[1]-1,p[0]):new Date(s)}
function sb(s){const m={'Προγραμματισμένο':'bg','Έτοιμο προς Τοποθέτηση':'bpp','Σε Αναμονή':'bo','Εκκρεμεί Πληροφορία':'br','Take Away':'bb'};return`<span class="badge ${m[s]||'bx'}">${s||'—'}</span>`}
function pb(p){const m={'Ολοκληρωμένη παραλαβή':'bg','Μεταλλικές Κατασκευές':'bo','Αναμονή Europa':'bb','Μερικώς Παραδομένα':'bo','Δεν Έχουμε Μέτρα':'br','Take Away':'bx','Ψευτόκασες':'bo'},sh={'Ολοκληρωμένη παραλαβή':'✓ Ολοκλ.','Μεταλλικές Κατασκευές':'Μεταλλ.','Αναμονή Europa':'Europa','Μερικώς Παραδομένα':'Μερικώς','Δεν Έχουμε Μέτρα':'Χ/Μέτρα','Take Away':'Take Away','Ψευτόκασες':'Ψευτόκ.'};return`<span class="badge ${m[p]||'bx'}">${sh[p]||p||'—'}</span>`}
function cb(c){if(!c)return'<span style="color:var(--t3);font-size:11px">—</span>';const cl={'Kariki':'var(--a2)','Rildo':'var(--pp)','Ermal':'#ec4899','Χάρης':'var(--or)'};return`<span style="color:${cl[c]||'var(--t2)'};font-weight:500;font-size:11px">${c}</span>`}
function donut(data,tot){const r=46,cx=60,cy=60,circ=2*Math.PI*r;let off=0;const sl=data.map(d=>{const da=d.v/tot*circ;const s=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${d.c}" stroke-width="14" stroke-dasharray="${da} ${circ-da}" stroke-dashoffset="${-off}"/>`;off+=da;return s});return`<svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="46" fill="none" stroke="var(--s3)" stroke-width="14"/>${sl.join('')}</svg><div class="dcn">${tot}<span>σύνολο</span></div>`}

document.getElementById('mc').innerHTML=`
  <div class="kg">
    <div class="kpi bl"><div class="ki">📋</div><div class="kl">Παραγγελίες</div><div class="kv">${tot}</div><div class="ks">Σύνολο</div></div>
    <div class="kpi gn"><div class="ki">📅</div><div class="kl">Τοποθετήσεις</div><div class="kv">${withT}</div><div class="ks">Προγραμματισμένες</div></div>
    <div class="kpi or"><div class="ki">⏳</div><div class="kl">Σε Αναμονή</div><div class="kv">${wait}</div><div class="ks">Αναμένουν υλικά</div></div>
    <div class="kpi pp"><div class="ki">💶</div><div class="kl">Αξία</div><div class="kv">${fe(TOTAL_VAL)}</div><div class="ks">Καθαρή αξία</div></div>
    <div class="kpi tl"><div class="ki">🪟</div><div class="kl">Κουφώματα</div><div class="kv">${TOTAL_KOUW}</div><div class="ks">Τεμάχια</div></div>
    <div class="kpi rd"><div class="ki">⚠</div><div class="kl">Εκκρεμή</div><div class="kv">${pend}</div><div class="ks">Χρειάζονται ενέργεια</div></div>
  </div>
  <div class="g3">
    <div class="panel">
      <div class="ph"><div class="pt">Κατάσταση Παραγγελιών</div><div class="ps">${tot} σύνολο</div></div>
      <div class="pb"><div class="dw"><div class="dc">${donut(dd,tot)}</div><div class="dl">${dd.map(d=>`<div class="di"><div class="dn"><div class="dd" style="background:${d.c}"></div>${d.l}</div><div class="dv">${d.v} <span style="color:var(--t3);font-size:10px">(${Math.round(d.v/tot*100)}%)</span></div></div>`).join('')}</div></div></div>
    </div>
    <div class="panel">
      <div class="ph"><div class="pt">Επόμενες Τοποθετήσεις</div><div class="ps">${upcoming.length} προγρ.</div></div>
      <div class="pb" style="padding:8px 16px">
        <table class="mt"><tr><th>Ημ/νία</th><th>Πελάτης</th><th>Συνεργείο</th><th>Κατ.</th></tr>
        ${upcoming.map(o=>`<tr><td class="mono" style="font-size:11px;color:var(--a2)">${o.topo}</td><td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.client.substring(0,15)}</td><td>${cb(o.crew)}</td><td>${sb(o.status)}</td></tr>`).join('')}
        </table>
      </div>
    </div>
    <div class="panel">
      <div class="ph"><div class="pt">⚡ Alerts</div><div class="ps">${alerts.length} ενεργά</div></div>
      <div class="pb" style="padding:8px 16px">
        ${alerts.map(a=>`<div class="ai"><span style="font-size:15px">${a.i}</span><div class="at">${a.t}</div><span class="ab" style="background:var(--${a.sc});color:var(--${a.tc})">${a.s}</span></div>`).join('')}
        ${!alerts.length?'<div style="color:var(--t2);font-size:12px;text-align:center;padding:20px">✅ Δεν υπάρχουν alerts</div>':''}
      </div>
    </div>
  </div>
  <div class="g2">
    <div class="panel">
      <div class="ph"><div class="pt">Top Πελάτες — Αξία</div><div class="ps">Βάσει Προσφορών</div></div>
      <div class="pb" style="padding:8px 16px">
        ${topC.map(([n,v],i)=>`<div class="cr"><div style="width:20px;font-size:11px;color:var(--t3)">${i+1}</div><div class="crn">${n.substring(0,22)}</div><div class="cb"><div class="cbf" style="width:${Math.round(v/maxV*100)}%;background:${['var(--a2)','var(--pp)','var(--tl)','var(--gn)','var(--or)','var(--b2)'][i]}"></div></div><div class="cv">${fe(v)}</div></div>`).join('')}
      </div>
    </div>
    <div class="panel">
      <div class="ph"><div class="pt">Συνεργεία</div><div class="ps">Επόμενες τοποθετήσεις</div></div>
      <div class="pb" style="padding:8px 16px">
        <table class="mt"><tr><th>Συνεργείο</th><th>Τοποθ.</th><th>Τύπος</th><th>Score</th></tr>
        ${crews.map(c=>`<tr><td style="font-weight:500">${c.n}</td><td style="text-align:center">${c.t}</td><td>${c.n==='Χάρης'?'<span style="color:var(--or);font-size:11px">Σίδερα</span>':'<span style="color:var(--a2);font-size:11px">Αλουμίνια</span>'}</td><td><span class="cs ${c.sc>=9?'shi':c.sc>=7.5?'smi':'slo'}">${c.sc}</span></td></tr>`).join('')}
        </table>
      </div>
    </div>
  </div>
  <div class="panel" style="margin-bottom:16px">
    <div class="ph"><div class="pt">Ροή Εργασιών</div></div>
    <div class="pb">
      <div class="flow">
        <div class="fs"><div class="fi f1">📥</div><div class="fn">${FIN_COUNT}</div><div class="fl">Νέες<br>Προσφορές</div></div>
        <div class="fa">→</div>
        <div class="fs"><div class="fi f2">⚙</div><div class="fn">${tot}</div><div class="fl">Σε<br>Παραγωγή</div></div>
        <div class="fa">→</div>
        <div class="fs"><div class="fi f3">📦</div><div class="fn">${O.filter(o=>o.phase==='Ολοκληρωμένη παραλαβή').length}</div><div class="fl">Παραλαβή<br>Υλικών</div></div>
        <div class="fa">→</div>
        <div class="fs"><div class="fi f4">🔧</div><div class="fn">${withT}</div><div class="fl">Προς<br>Τοποθέτηση</div></div>
        <div class="fa">→</div>
        <div class="fs"><div class="fi f5">✅</div><div class="fn">${ta}</div><div class="fl">Take Away /<br>Ολοκλ.</div></div>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="ph"><div class="pt">Πλήρης Κατάσταση Παραγγελιών</div><div class="ps">${tot} εγγραφές</div></div>
    <div style="overflow-x:auto">
      <table class="mt" style="font-size:11px">
        <tr><th>Προσφορά</th><th>Πελάτης</th><th>Φάση</th><th>Κατάσταση</th><th>Τοποθέτηση</th><th>Europa</th><th>Συνεργείο</th><th>Κουφ.</th><th>Ρολά</th><th>Αξία</th></tr>
        ${O.map(o=>`<tr><td class="mono" style="color:var(--a2)">${o.offer}</td><td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.client}</td><td>${pb(o.phase)}</td><td>${sb(o.status)}</td><td class="mono">${o.topo||'—'}</td><td class="mono" style="color:var(--t2)">${o.europa||'—'}</td><td>${cb(o.crew)}</td><td style="text-align:center">${o.kouw||'—'}</td><td style="text-align:center">${o.rola||'—'}</td><td class="mono" style="color:var(--gn)">${o.value||'—'}</td></tr>`).join('')}
      </table>
    </div>
  </div>
`;
</script>
</body>
</html>
